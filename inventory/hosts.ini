[ec2_instances]
# Substitua pelos IPs públicos gerados pelo Terraform (terraform output ansible_inventory)
ec2-ansible-1 ansible_host=COLOQUE_IP_INSTANCIA_1 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/ansible-keypair.pem
ec2-ansible-2 ansible_host=COLOQUE_IP_INSTANCIA_2 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/ansible-keypair.pem
ec2-ansible-3 ansible_host=COLOQUE_IP_INSTANCIA_3 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/ansible-keypair.pem

[ec2_instances:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
